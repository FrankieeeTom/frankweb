name: Eleventy Build
on:
  push:
    branches:
      - main


jobs:
  build_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@master
      - name: Build
        run: |
          npm install
          npx eleventy --pathprefix=frankweb
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main'
        with:
          publish_dir: ./_site
          github_token: ${{ secrets.GITHUB_TOKEN }}
